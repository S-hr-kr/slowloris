server:
  port: 8082

spring:
  application:
    name: monitor-service
  config:
    import:
      - optional:nacos:monitor-service.yml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        file-extension: yml
  datasource:
    url: jdbc:mysql://localhost:3305/slowloris?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Root@123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6378
      password: default
      database: 0

# LangChain4J Configuration
langchain4j:
  openai:
    api-key: ${OPENAI_API_KEY:your-api-key-here}
    model: gpt-3.5-turbo
    temperature: 0.3

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.slowloris.monitor.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
