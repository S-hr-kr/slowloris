server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import:
      - optional:nacos:gateway-service.yml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        file-extension: yml
    gateway:
      # Enable WebSocket support
      httpclient:
        websocket:
          max-frame-payload-size: 0
      routes:
        # WebSocket 和 SockJS - 支持降级传输 (不需要 JWT 验证)
        - id: websocket-route
          uri: lb://auth-service
          predicates:
            - Path=/ws/**, /api/ws/**, /sockjs/**, /api/sockjs/**
          filters:
            - StripPrefix=0
        
        # Auth Service - 用户认证模块 (不需要 JWT 验证)
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
        
        # Monitor Service - IP 监控、流量分析、攻击检测模块
        - id: monitor-service
          uri: lb://monitor-service
          filters:
            - StripPrefix=0
          predicates:
            - Path=/**
        
        # Alert Service - 告警管理模块
        - id: alert-service
          uri: lb://alert-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
            - JwtFilter
        
        # Prediction Service - 模型预测模块
        - id: prediction-service
          uri: lb://prediction-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
            - JwtFilter
        
        # User Service - 用户管理模块
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
            - JwtFilter
        
        # System Service - 系统配置模块
        - id: system-config-service
          uri: lb://system-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
            - JwtFilter
        
        # Report Service - 数据报表模块
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
            - JwtFilter
        
        # Log Service - 日志中心模块
        - id: log-service
          uri: lb://log-service
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
            - JwtFilter

# JWT Configuration
jwt:
  secret: slowloris_secret_key_2024_secure_jwt_signing_key_minimum_64_characters_for_hs512_algorithm
  expiration: 3600000*24 # 1 hour in milliseconds

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
  endpoint:
    health:
      show-details: always